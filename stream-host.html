<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070b18" />
  <title>Host Stream | Adem Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- Socket.IO client library — loaded from server -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* =====================================================
       HOST DASHBOARD — DARK THEME
       Consistent with existing Adem Digital design tokens
       ===================================================== */
    :root {
      --bg: #060912;
      --bg-soft: #0b1020;
      --card: rgba(15, 22, 42, .78);
      --text: #f6f8ff;
      --muted: #9aa6bf;
      --line: rgba(255,255,255,.11);
      --primary: #4b7cff;
      --secondary: #7c4dff;
      --cyan: #20d9ff;
      --green: #34d399;
      --red: #ff4b6a;
      --gradient: linear-gradient(135deg, #20d9ff 0%, #4b7cff 48%, #8c4dff 100%);
      --radius: 22px;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Manrope", sans-serif; color: var(--text);
      background: var(--bg); min-height: 100vh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* Back navigation link */
    .back-link {
      position: fixed; top: 28px; left: 32px; z-index: 10;
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: .85rem; font-weight: 600; transition: .2s;
    }
    .back-link:hover { color: var(--text); }

    /* Ambient glow effects — matching main site */
    .glow { position: fixed; width: 420px; height: 420px; filter: blur(110px); opacity: .12; pointer-events: none; z-index: 0; }
    .glow--one { background: #3268ff; left: -180px; top: 25%; }
    .glow--two { background: #8a3eff; right: -180px; bottom: 10%; }

    /* Main layout */
    .host-page {
      position: relative; z-index: 1;
      width: min(1100px, calc(100% - 40px));
      margin: 120px auto 60px; animation: fadeIn .6s ease;
    }

    /* ---- PRE-STREAM SCREEN (before going live) ---- */
    #preStream {
      text-align: center; padding: 60px 20px;
    }
    #preStream h1 {
      font-family: "Space Grotesk"; font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -.04em; margin-bottom: 10px;
    }
    #preStream p { color: var(--muted); font-size: .95rem; margin-bottom: 40px; max-width: 480px; margin-inline: auto; }

    /* Camera permission prompt */
    .camera-prompt {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; margin-bottom: 40px;
    }
    .camera-prompt video {
      width: min(480px, 100%); aspect-ratio: 16/9;
      border-radius: 16px; border: 1px solid var(--line); background: #0a0e1b;
      object-fit: cover;
    }

    /* Start button */
    .start-btn {
      padding: 18px 40px; border: none; border-radius: 14px;
      background: var(--gradient); color: white;
      font-family: "Space Grotesk"; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: .25s; letter-spacing: .01em;
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 18px 46px rgba(75,124,255,.35); }
    .start-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ---- LIVE STREAM SCREEN (after going live) ---- */
    #liveScreen { display: none; }

    .live-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
    }
    .live-header h2 { font-family: "Space Grotesk"; font-size: 1.6rem; letter-spacing: -.02em; }

    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 14px; border-radius: 30px;
      background: rgba(255,59,48,.15); border: 1px solid rgba(255,59,48,.3);
      font-size: .72rem; font-weight: 800; color: #ff3b30;
      text-transform: uppercase; letter-spacing: .1em;
    }
    .live-badge::before {
      content: ""; width: 7px; height: 7px; border-radius: 50%;
      background: #ff3b30; animation: pulse-dot 1.5s ease-in-out infinite;
    }

    /* Stream credentials display */
    .credentials {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-bottom: 24px;
    }
    .cred-card {
      padding: 24px; border-radius: 18px;
      border: 1px solid var(--line); background: var(--card);
      text-align: center;
    }
    .cred-card label {
      display: block; color: var(--muted); font-size: .72rem;
      text-transform: uppercase; letter-spacing: .12em; font-weight: 700;
      margin-bottom: 10px;
    }
    .cred-card .value {
      font-family: "Space Grotesk"; font-size: 2rem; font-weight: 700;
      letter-spacing: .15em; color: var(--cyan);
    }
    .cred-card .copy-hint {
      display: block; margin-top: 10px; color: #556080; font-size: .7rem; cursor: pointer;
    }
    .cred-card .copy-hint:hover { color: var(--primary); }

    /* Video preview */
    .preview-wrapper {
      position: relative; width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--line); background: #0a0e1b;
      box-shadow: var(--shadow); margin-bottom: 24px;
    }
    .preview-wrapper video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* Viewer count + controls */
    .live-controls {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .viewer-count {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--line);
      font-size: .85rem; font-weight: 600;
    }
    .viewer-count .icon { font-size: 1rem; }

    .end-btn {
      padding: 14px 32px; border: 1px solid var(--red); border-radius: 13px;
      background: rgba(255,75,106,.08); color: var(--red);
      font-family: "Space Grotesk"; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: .25s;
    }
    .end-btn:hover { background: var(--red); color: white; }

    /* Toast notifications */
    .toast {
      position: fixed; bottom: 32px; right: 32px; z-index: 100;
      padding: 14px 22px; border-radius: 14px;
      background: var(--card); border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      font-size: .85rem; font-weight: 600;
      transform: translateY(100px); opacity: 0; transition: .35s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(52,211,153,.4); color: var(--green); }
    .toast.error { border-color: rgba(255,75,106,.4); color: var(--red); }
    .toast.info { border-color: rgba(75,124,255,.4); color: var(--primary); }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

    @media (max-width: 600px) {
      .host-page { margin-top: 100px; }
      .credentials { grid-template-columns: 1fr; }
      .cred-card .value { font-size: 1.5rem; }
      .live-header { flex-direction: column; align-items: flex-start; }
      .live-controls { flex-direction: column; }
      .end-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="glow glow--one"></div>
  <div class="glow glow--two"></div>

  <a class="back-link" href="index.html">← Back to site</a>

  <!-- ===========================================================
       PRE-STREAM SCREEN
       Shown before the host starts streaming.
       Requests camera/mic permission and shows preview.
       =========================================================== -->
  <div class="host-page" id="preStream">
    <h1>Start Live Stream</h1>
    <p>Grant camera and microphone access, then click "Go Live" to start your private stream.</p>

    <div class="camera-prompt">
      <video id="previewVideo" autoplay muted playsinline></video>
    </div>

    <button class="start-btn" id="startBtn">Go Live ▶</button>
  </div>

  <!-- ===========================================================
       LIVE STREAM SCREEN
       Shown after the host goes live.
       Displays Stream ID, Access Code, viewer count, and controls.
       =========================================================== -->
  <div class="host-page" id="liveScreen">
    <div class="live-header">
      <h2>You're Live!</h2>
      <div class="live-badge">Live</div>
    </div>

    <!-- Stream credentials — share these with authorized viewers -->
    <div class="credentials">
      <div class="cred-card">
        <label>Stream ID</label>
        <div class="value" id="displayStreamId">------</div>
        <span class="copy-hint" onclick="copyToClipboard('displayStreamId')">Click to copy</span>
      </div>
      <div class="cred-card">
        <label>Access Code</label>
        <div class="value" id="displayAccessCode">------</div>
        <span class="copy-hint" onclick="copyToClipboard('displayAccessCode')">Click to copy</span>
      </div>
    </div>

    <!-- Host's own video preview -->
    <div class="preview-wrapper">
      <video id="hostVideo" autoplay muted playsinline></video>
    </div>

    <!-- Controls bar -->
    <div class="live-controls">
      <div class="viewer-count">
        <span class="icon">👁</span>
        <span id="viewerCount">0 viewers</span>
      </div>
      <button class="end-btn" id="endBtn">End Stream</button>
    </div>
  </div>

  <!-- Toast notification element -->
  <div class="toast" id="toast"></div>

  <!-- ===========================================================
       HOST WEBRTC + SIGNALING LOGIC
       ===========================================================
       This script handles:
       1. Requesting camera/mic permissions
       2. Creating a stream on the server
       3. Connecting to Socket.IO for signaling
       4. Creating WebRTC peer connections for each viewer
       5. Sending the host's media stream to all viewers
       6. Ending the stream and cleaning up
       =========================================================== -->
  <script>
    /* ---- DOM References ---- */
    const preStream = document.getElementById("preStream");
    const liveScreen = document.getElementById("liveScreen");
    const previewVideo = document.getElementById("previewVideo");
    const hostVideo = document.getElementById("hostVideo");
    const startBtn = document.getElementById("startBtn");
    const endBtn = document.getElementById("endBtn");
    const displayStreamId = document.getElementById("displayStreamId");
    const displayAccessCode = document.getElementById("displayAccessCode");
    const viewerCountEl = document.getElementById("viewerCount");
    const toastEl = document.getElementById("toast");

    /* ---- State ---- */
    let localStream = null;       // Host's camera/mic stream
    let socket = null;            // Socket.IO connection
    let currentStreamId = null;   // Current stream ID
    let peerConnections = {};     // Map of viewerSocketId -> RTCPeerConnection

    /**
     * WebRTC configuration.
     * STUN servers allow peers to discover their public IP.
     * For production, add a TURN server for restrictive networks.
     */
    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
      ],
    };

    /* ---- Toast Notification Helper ---- */
    function showToast(message, type = "info") {
      toastEl.textContent = message;
      toastEl.className = `toast ${type} show`;
      setTimeout(() => toastEl.classList.remove("show"), 3500);
    }

    /* ---- Copy to Clipboard ---- */
    function copyToClipboard(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast("Copied to clipboard!", "success");
      });
    }

    /* ===========================================================
     * STEP 1: Request Camera/Mic & Show Preview
     * =========================================================== */
    async function initCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true,
        });
        previewVideo.srcObject = localStream;
        showToast("Camera ready!", "success");
        startBtn.disabled = false;
      } catch (err) {
        console.error("Camera access denied:", err);
        showToast("Camera/microphone access is required.", "error");
        startBtn.disabled = true;
      }
    }

    /* ===========================================================
     * STEP 2: Create Stream & Start Signaling
     * =========================================================== */
    async function goLive() {
      try {
        // Ask the server to create a new stream
        const res = await fetch("/api/streams/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        });
        const { streamId, accessCode } = await res.json();

        currentStreamId = streamId;

        // Display the credentials for the host to share
        displayStreamId.textContent = streamId;
        displayAccessCode.textContent = accessCode;

        // Switch UI from pre-stream to live
        preStream.style.display = "none";
        liveScreen.style.display = "block";

        // Show host's video in the preview
        hostVideo.srcObject = localStream;

        // Connect to Socket.IO for signaling
        connectSocket(streamId);

        showToast("Stream is live! Share the Stream ID and Access Code.", "success");
      } catch (err) {
        console.error("Failed to create stream:", err);
        showToast("Failed to start stream. Try again.", "error");
      }
    }

    /* ===========================================================
     * STEP 3: Socket.IO Connection & Event Handlers
     * =========================================================== */
    function connectSocket(streamId) {
      socket = io();

      // Announce ourselves as the host of this stream
      socket.emit("host-join", { streamId });

      /**
       * A new viewer has connected.
       * We create a new RTCPeerConnection for this viewer,
       * add our local stream tracks, create an offer, and send it.
       */
      socket.on("viewer-joined", async ({ viewerSocketId }) => {
        console.log("Viewer joined:", viewerSocketId);
        showToast("A viewer connected!", "info");

        // Create a new peer connection for this viewer
        const pc = new RTCPeerConnection(rtcConfig);
        peerConnections[viewerSocketId] = pc;

        // Add all local stream tracks (video + audio) to the connection
        localStream.getTracks().forEach((track) => {
          pc.addTrack(track, localStream);
        });

        // Handle ICE candidates — send them to the viewer via signaling
        pc.onicecandidate = (event) => {
          if (event.candidate) {
            socket.emit("ice-candidate", {
              to: viewerSocketId,
              candidate: event.candidate,
            });
          }
        };

        // Log connection state changes for debugging
        pc.onconnectionstatechange = () => {
          console.log(`PC [${viewerSocketId}] state:`, pc.connectionState);
        };

        // Create an SDP offer and send it to the viewer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit("offer", {
          to: viewerSocketId,
          offer: pc.localDescription,
        });
      });

      /**
       * Viewer sent back their SDP answer.
       * Set it as the remote description to complete the handshake.
       */
      socket.on("answer", async ({ from, answer }) => {
        const pc = peerConnections[from];
        if (pc) {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
      });

      /**
       * Viewer sent an ICE candidate.
       * Add it to the corresponding peer connection.
       */
      socket.on("ice-candidate", async ({ from, candidate }) => {
        const pc = peerConnections[from];
        if (pc && candidate) {
          await pc.addIceCandidate(new RTCIceCandidate(candidate));
        }
      });

      /**
       * A viewer disconnected.
       * Clean up their peer connection (stream continues for others).
       */
      socket.on("viewer-left", ({ viewerSocketId }) => {
        if (peerConnections[viewerSocketId]) {
          peerConnections[viewerSocketId].close();
          delete peerConnections[viewerSocketId];
        }
      });

      /**
       * Update the viewer count display.
       */
      socket.on("viewer-count", ({ count }) => {
        viewerCountEl.textContent = `${count} viewer${count !== 1 ? "s" : ""}`;
      });

      /**
       * Socket disconnected — handle gracefully.
       */
      socket.on("disconnect", () => {
        showToast("Connection lost.", "error");
      });
    }

    /* ===========================================================
     * STEP 4: End Stream
     * =========================================================== */
    function endStream() {
      // Notify the server to end the stream and disconnect viewers
      if (socket && currentStreamId) {
        socket.emit("end-stream", { streamId: currentStreamId });
      }

      // Close all peer connections
      Object.values(peerConnections).forEach((pc) => pc.close());
      peerConnections = {};

      // Stop all local stream tracks (release camera/mic)
      if (localStream) {
        localStream.getTracks().forEach((track) => track.stop());
      }

      // Disconnect socket
      if (socket) socket.disconnect();

      showToast("Stream ended.", "info");

      // Redirect back to main site after a short delay
      setTimeout(() => { window.location.href = "index.html"; }, 1500);
    }

    /* ---- Event Listeners ---- */
    startBtn.addEventListener("click", goLive);
    endBtn.addEventListener("click", endStream);

    /* ---- Initialize: request camera on page load ---- */
    initCamera();
  </script>
</body>
</html>
